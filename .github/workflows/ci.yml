name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aitrpg
          POSTGRES_PASSWORD: aitrpg
          POSTGRES_DB: aitrpg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aitrpg -d aitrpg"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Push Prisma schema
        env:
          DATABASE_URL: postgresql://aitrpg:aitrpg@127.0.0.1:5432/aitrpg
        run: pnpm exec prisma db push --schema apps/api/prisma/schema.prisma

      - name: Shared tests
        run: pnpm --filter @aitrpg/shared test

      - name: API unit tests
        env:
          DATABASE_URL: postgresql://aitrpg:aitrpg@127.0.0.1:5432/aitrpg
        run: pnpm --filter api test

      - name: API e2e tests
        env:
          DATABASE_URL: postgresql://aitrpg:aitrpg@127.0.0.1:5432/aitrpg
        run: pnpm --filter api test:e2e

      - name: Web lint
        run: pnpm --filter web lint

      - name: API build
        run: pnpm --filter api build

      - name: Web build
        run: pnpm --filter web build
