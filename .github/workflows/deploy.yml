name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @aitrpg/shared build

      - name: Build API
        run: pnpm --filter api build

      - name: Build web
        run: pnpm --filter web build

      - name: Deployment prerequisites
        run: |
          test -n "${{ secrets.DEPLOY_HOST }}"
          test -n "${{ secrets.DEPLOY_USER }}"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          test -n "${{ secrets.DEPLOY_TARGET_DIR }}"
          test -n "${{ secrets.APP_DOMAIN }}"
          test -n "${{ secrets.OPENAI_BASE_URL }}"
          test -n "${{ secrets.OPENAI_API_KEY }}"
          test -n "${{ secrets.OPENAI_TEXT_MODEL }}"
          test -n "${{ secrets.OPENAI_IMAGE_MODEL }}"
          test -n "${{ secrets.OPENAI_VIDEO_MODEL }}"
          test -n "${{ secrets.JWT_SECRET }}"

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_TARGET_DIR }}/"

      - name: Remote deploy
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          export DEPLOY_TARGET_DIR="${{ secrets.DEPLOY_TARGET_DIR }}"
          export APP_DOMAIN="${{ secrets.APP_DOMAIN }}"
          export LETSENCRYPT_EMAIL="${{ secrets.LETSENCRYPT_EMAIL }}"
          export OPENAI_BASE_URL="${{ secrets.OPENAI_BASE_URL }}"
          export OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          export OPENAI_TEXT_MODEL="${{ secrets.OPENAI_TEXT_MODEL }}"
          export OPENAI_IMAGE_MODEL="${{ secrets.OPENAI_IMAGE_MODEL }}"
          export OPENAI_VIDEO_MODEL="${{ secrets.OPENAI_VIDEO_MODEL }}"
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          cd "${{ secrets.DEPLOY_TARGET_DIR }}"
          chmod +x infra/scripts/remote-deploy.sh
          ./infra/scripts/remote-deploy.sh
          EOF
