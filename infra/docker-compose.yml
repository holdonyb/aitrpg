services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aitrpg
      POSTGRES_PASSWORD: aitrpg
      POSTGRES_DB: aitrpg
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitrpg -d aitrpg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:${SMTP_HOST_PORT:-1025}:1025"
      - "127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 4000
    ports:
      - "127.0.0.1:${API_HOST_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
